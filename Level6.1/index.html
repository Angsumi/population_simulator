<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 6: Savanna Ecosystem</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <header>
    <div class="header-title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>Savanna</span> Simulator
    </div>
    <div class="controls-bar">
      <button id="btnStart" class="btn-primary">Run</button>
      <button id="btnInstant" class="btn-secondary">Instant</button>
      <button id="btnReset" class="btn-danger">Reset</button>
    </div>
  </header>

  <div class="main-grid">
    <aside class="panel params-panel">
      <h2 class="panel-title">Parameters</h2>
      
      <div class="input-group">
        <label>Initial Deer</label>
        <input type="number" id="param-initDeer" value="150">
      </div>
      <div class="input-group">
        <label>Initial Lions</label>
        <input type="number" id="param-initLions" value="12">
      </div>
      <div class="input-group">
        <label>Base Grass Spawn/Day</label>
        <input type="number" id="param-grassSpawn" value="80">
      </div>
      <div class="input-group">
        <label>Season Cycle (Days)</label>
        <input type="number" id="param-seasonLength" value="365">
      </div>
      <div class="input-group">
        <label>Grass for Fawn</label>
        <input type="number" id="param-deerFoodReq" value="5">
      </div>
      <div class="input-group">
        <label>Deer for Cub</label>
        <input type="number" id="param-lionFoodReq" value="2">
      </div>
      <div class="input-group">
        <label>Deer Starvation (Days)</label>
        <input type="number" id="param-deerStarvation" value="10">
      </div>
      <div class="input-group">
        <label>Lion Starvation (Days)</label>
        <input type="number" id="param-lionStarvation" value="20">
      </div>
      <div class="input-group">
        <label>Days to Run</label>
        <input type="number" id="param-days" value="1095">
      </div>
    </aside>

    <main class="canvas-container">
      <canvas id="simCanvas"></canvas>
    </main>

    <aside class="panel stats-panel">
      <h2 class="panel-title">Live Stats</h2>
      
      <div class="stat-box">
        <div class="stat-label">Time Elapsed</div>
        <div class="stat-value" id="stat-time">0d (0.0y)</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Season</div>
        <div class="stat-value wet" id="stat-season">Wet Season</div>
      </div>


      <div class="stat-box">
        <div class="stat-label">Deer Population</div>
        <div class="stat-value" id="stat-deer" style="color: var(--accent-blue);">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Lion Population</div>
        <div class="stat-value" id="stat-lion" style="color: var(--accent);">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Grass Count</div>
        <div class="stat-value" id="stat-grass" style="color: var(--accent-green);">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Grass Quality</div>
        <div class="stat-value" id="stat-quality">Lush</div>
      </div>
    </aside>
  </div>

  <div class="charts-row">
    <div class="chart-container"><canvas id="chartPopulation"></canvas></div>
    <div class="chart-container"><canvas id="chartGrass"></canvas></div>
    <div class="chart-container"><canvas id="chartGrowth"></canvas></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
